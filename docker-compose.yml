services:
  web:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped

  tunnel:
    image: ngrok/ngrok:latest
    command: http --url=${NGROK_DOMAIN} web:3000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - web
    restart: unless-stopped
